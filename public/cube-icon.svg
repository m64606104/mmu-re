<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </radialGradient>
    
    <!-- 立方体渐变 -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E8FF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 光晕效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="120"/>
  
  <!-- 外层光环 -->
  <ellipse cx="256" cy="320" rx="180" ry="30" fill="none" stroke="#A78BFA" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="320" rx="160" ry="25" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.6"/>
  
  <!-- 3D立方体 -->
  <!-- 顶面 -->
  <path d="M156 220 L256 160 L356 220 L256 280 Z" fill="url(#topFace)" filter="url(#glow)"/>
  
  <!-- 左面 -->
  <path d="M156 220 L256 280 L256 380 L156 320 Z" fill="url(#leftFace)"/>
  
  <!-- 右面 -->
  <path d="M256 280 L356 220 L356 320 L256 380 Z" fill="url(#rightFace)"/>
  
  <!-- 内部光点 -->
  <circle cx="220" cy="200" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="290" cy="190" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="240" cy="340" r="2" fill="#C4B5FD" opacity="0.7"/>
</svg>
